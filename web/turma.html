<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Atividades da Turma</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css">

</head>

<body onload="carregarAtividades()">

    <div class="container">

        <nav>

            <div class="logo-menu">

                <i class="fa-solid fa-school fa-2x"></i>

                <h2>Controle Escolar</h2>

            </div>

            <ul>

                <li onclick="voltar()">

                    <i class="fa-solid fa-arrow-left"></i>

                    Voltar

                </li>

                <li onclick="sair()">

                    <i class="fa-solid fa-right-from-bracket"></i>

                    Sair

                </li>

            </ul>

        </nav>

        <main>

            <div class="topo">

                <div>

                    <h1>
                        Atividades da Turma
                    </h1>

                    <p>
                        Gerencie as atividades
                    </p>

                </div>

                <button onclick="modalAtividade.classList.remove('oculto')">

                    <i class="fa-solid fa-plus"></i>

                    Nova Atividade

                </button>

            </div>

            <div class="tabela">

                <table>

                    <thead>

                        <tr>
                            <th>#</th>
                            <th>Descrição</th>
                            <th>Término</th>
                            <th>Ações</th>
                        </tr>

                    </thead>

                    <tbody id="listaAtividades">

                    </tbody>

                </table>

            </div>

        </main>

    </div>



    <div id="modalAtividade" class="modal oculto">

        <div class="janela">

            <h2>Cadastrar Atividade</h2>

            <form id="formAtividade">

                <label>Descrição</label>

                <input type="text" id="descricao" required>

                <label>Data de Término</label>

                <input type="date" id="termino" required>

                <br><br>

                <button type="button" onclick="modalAtividade.classList.add('oculto')">

                    Cancelar

                </button>

                <button type="submit">

                    Salvar

                </button>

            </form>

        </div>

    </div>

    <script src="turma.js"></script>

    <script>

        document
            .querySelector('#formAtividade')
            .addEventListener(
                'submit',
                cadastrarAtividade
            );

    </script>

</body>

</html>
